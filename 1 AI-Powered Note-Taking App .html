<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Lumen Notes — an offline-first, AI-powered note-taking app." />
  <meta name="theme-color" content="#0b0d12" />
  <title>Lumen Notes — AI Note-Taking</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<style>
    /* =========================================================
   Lumen Notes — Design System
   ========================================================= */
:root {
  --bg: #f7f7f5;
  --bg-elev: #ffffff;
  --bg-sidebar: #fbfbf9;
  --surface: #ffffff;
  --surface-hover: #f1f1ee;
  --surface-active: #ebebe6;
  --border: #e6e6e1;
  --border-strong: #d8d8d2;
  --text: #1c1c1a;
  --text-muted: #6b6b66;
  --text-faint: #9a9a92;
  --accent: #6366f1;
  --accent-hover: #5558e6;
  --accent-soft: #eef0ff;
  --ai-from: #8b5cf6;
  --ai-to: #ec4899;
  --danger: #dc2626;
  --success: #16a34a;
  --shadow-sm: 0 1px 2px rgba(20,20,20,.04), 0 1px 1px rgba(20,20,20,.03);
  --shadow-md: 0 4px 16px rgba(20,20,20,.06), 0 2px 4px rgba(20,20,20,.04);
  --shadow-lg: 0 24px 48px -12px rgba(20,20,20,.18);
  --radius: 10px;
  --radius-lg: 14px;
  --font-sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
  --font-serif: "Iowan Old Style", "Palatino", "Georgia", serif;
  --font-mono: ui-monospace, SFMono-Regular, "JetBrains Mono", Menlo, monospace;
  --transition: 160ms cubic-bezier(.2,.8,.2,1);
}

[data-theme="dark"] {
  --bg: #0e0f12;
  --bg-elev: #14161b;
  --bg-sidebar: #101216;
  --surface: #181a20;
  --surface-hover: #1f222a;
  --surface-active: #262a34;
  --border: #23262e;
  --border-strong: #2e323c;
  --text: #ececea;
  --text-muted: #9b9ea6;
  --text-faint: #696c75;
  --accent: #818cf8;
  --accent-hover: #9ba4fa;
  --accent-soft: #1d1f3a;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
  --shadow-md: 0 6px 20px rgba(0,0,0,.35);
  --shadow-lg: 0 30px 60px -16px rgba(0,0,0,.6);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-size: 15px;
  line-height: 1.55;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; color: inherit; }

/* =========================================================
   Layout
   ========================================================= */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: 100vh;
  overflow: hidden;
}

/* =========================================================
   Sidebar
   ========================================================= */
.sidebar {
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 14px 12px;
  gap: 12px;
  min-height: 0;
}
.sidebar__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 6px 6px;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand__mark {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  background: linear-gradient(135deg, var(--ai-from), var(--ai-to));
  color: #fff; border-radius: 9px;
  font-weight: 700;
  box-shadow: var(--shadow-sm);
}
.brand__title { font-weight: 650; letter-spacing: -.01em; }
.brand__subtitle { font-size: 11px; color: var(--text-muted); margin-top: -2px; }

.search {
  position: relative;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  transition: border-color var(--transition);
}
.search:focus-within { border-color: var(--accent); }
.search input {
  flex: 1; border: none; outline: none; background: transparent;
  font-size: 13.5px; color: var(--text);
}

.notes-list {
  flex: 1;
  overflow-y: auto;
  display: flex; flex-direction: column;
  gap: 2px;
  padding-right: 2px;
  margin: 0 -4px;
  padding-left: 4px;
}
.notes-list::-webkit-scrollbar { width: 6px; }
.notes-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

.note-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background var(--transition), border-color var(--transition);
  display: flex; flex-direction: column; gap: 3px;
  position: relative;
}
.note-item:hover { background: var(--surface-hover); }
.note-item.is-active {
  background: var(--surface);
  border-color: var(--border);
  box-shadow: var(--shadow-sm);
}
.note-item__title {
  font-size: 13.5px;
  font-weight: 550;
  display: flex; align-items: center; gap: 6px;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.note-item__pin { color: var(--accent); font-size: 11px; }
.note-item__preview {
  font-size: 12px; color: var(--text-muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.note-item__date { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
.note-item mark {
  background: var(--accent-soft); color: var(--accent);
  padding: 0 2px; border-radius: 3px;
}

.notes-list__empty {
  padding: 28px 12px;
  text-align: center;
  color: var(--text-faint);
  font-size: 13px;
}

.sidebar__footer {
  display: flex; flex-direction: column; gap: 2px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}

/* =========================================================
   Buttons
   ========================================================= */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 550;
  transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn--block { width: 100%; justify-content: center; }
.btn--primary {
  background: var(--text); color: var(--bg);
  box-shadow: var(--shadow-sm);
}
.btn--primary:hover { background: #000; }
[data-theme="dark"] .btn--primary { background: var(--accent); color: #fff; }
[data-theme="dark"] .btn--primary:hover { background: var(--accent-hover); }
.btn--ghost { background: transparent; color: var(--text-muted); }
.btn--ghost:hover { background: var(--surface-hover); color: var(--text); }
.btn--ai {
  background: linear-gradient(135deg, var(--ai-from), var(--ai-to));
  color: #fff;
  box-shadow: 0 4px 14px -4px rgba(139,92,246,.5);
}
.btn--ai:hover { filter: brightness(1.05); }

.icon-btn {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  border-radius: 8px;
  color: var(--text-muted);
  transition: background var(--transition), color var(--transition);
}
.icon-btn:hover { background: var(--surface-hover); color: var(--text); }
.icon-btn--mobile { display: none; }

.ghost-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  font-size: 12.5px;
  color: var(--text-muted);
  border-radius: 7px;
  transition: background var(--transition), color var(--transition);
  text-align: left;
}
.ghost-btn:hover { background: var(--surface-hover); color: var(--text); }

/* =========================================================
   Main / Editor
   ========================================================= */
.main {
  display: flex; flex-direction: column;
  min-height: 0;
  background: var(--bg);
}
.main__header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.title-input {
  flex: 1;
  background: transparent;
  border: none; outline: none;
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.title-input::placeholder { color: var(--text-faint); font-weight: 500; }

.header__actions { display: flex; align-items: center; gap: 8px; }
.save-status {
  font-size: 11.5px;
  color: var(--text-faint);
  margin-right: 4px;
  transition: color var(--transition);
}
.save-status.is-saving { color: var(--accent); }

.toolbar {
  display: flex; align-items: center; gap: 2px;
  padding: 6px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev);
  overflow-x: auto;
}
.tool {
  min-width: 30px; height: 30px;
  padding: 0 8px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--text-muted);
  display: inline-flex; align-items: center; justify-content: center;
  transition: background var(--transition), color var(--transition);
}
.tool:hover { background: var(--surface-hover); color: var(--text); }
.tool.is-active { background: var(--accent-soft); color: var(--accent); }
.tool-sep {
  width: 1px; height: 18px; background: var(--border); margin: 0 4px;
}

.editor-wrap {
  flex: 1;
  overflow-y: auto;
  display: flex;
  justify-content: center;
}
.editor {
  width: 100%;
  max-width: 760px;
  padding: 36px 28px 120px;
  outline: none;
  font-size: 16px;
  line-height: 1.7;
  color: var(--text);
}
.editor:empty::before {
  content: attr(data-placeholder);
  color: var(--text-faint);
  pointer-events: none;
}
.editor h1 { font-size: 28px; font-weight: 700; margin: 24px 0 12px; letter-spacing: -.02em; }
.editor h2 { font-size: 22px; font-weight: 650; margin: 20px 0 10px; letter-spacing: -.01em; }
.editor p { margin: 8px 0; }
.editor ul, .editor ol { margin: 8px 0; padding-left: 26px; }
.editor li { margin: 3px 0; }
.editor pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  font-family: var(--font-mono);
  font-size: 13px;
  overflow-x: auto;
  margin: 12px 0;
}
.editor a { color: var(--accent); }

.meta-bar {
  position: sticky; bottom: 0;
  display: flex; justify-content: space-between;
  max-width: 760px; width: 100%;
  margin: 0 auto;
  padding: 8px 28px;
  font-size: 11.5px;
  color: var(--text-faint);
  background: linear-gradient(to top, var(--bg) 60%, transparent);
}

/* =========================================================
   Modal
   ========================================================= */
.modal {
  position: fixed; inset: 0;
  display: grid; place-items: center;
  z-index: 50;
  animation: fadeIn .18s ease;
}
.modal[hidden] { display: none; }
.modal__backdrop {
  position: absolute; inset: 0;
  background: rgba(10,10,10,.5);
  backdrop-filter: blur(4px);
}
.modal__panel {
  position: relative;
  width: min(560px, calc(100vw - 32px));
  max-height: 80vh;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column;
  animation: pop .22s cubic-bezier(.2,.9,.3,1.2);
}
.modal__header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.modal__header h2 { margin: 0; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.ai-badge {
  background: linear-gradient(135deg, var(--ai-from), var(--ai-to));
  color: #fff; font-size: 10px; font-weight: 700;
  padding: 3px 7px; border-radius: 5px; letter-spacing: .04em;
}
.modal__body {
  padding: 20px;
  overflow-y: auto;
  font-size: 14.5px;
  line-height: 1.65;
  color: var(--text);
}
.modal__body p { margin: 0 0 12px; }
.modal__body ul { padding-left: 20px; }
.modal__body li { margin: 4px 0; }
.modal__body h3 {
  font-size: 13px; text-transform: uppercase; letter-spacing: .06em;
  color: var(--text-muted); margin: 16px 0 8px; font-weight: 600;
}
.modal__footer {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
}
.skeleton {
  height: 12px; background: var(--surface-hover);
  border-radius: 6px; margin-bottom: 10px;
  animation: pulse 1.4s ease-in-out infinite;
}
.skeleton--sm { width: 60%; }

/* =========================================================
   Toast
   ========================================================= */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: var(--text); color: var(--bg);
  padding: 10px 16px; border-radius: 8px;
  font-size: 13px;
  box-shadow: var(--shadow-lg);
  z-index: 60;
  animation: slideUp .22s ease;
}

/* =========================================================
   Animations
   ========================================================= */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pop { from { opacity: 0; transform: scale(.96) translateY(6px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
@keyframes pulse { 0%, 100% { opacity: .6; } 50% { opacity: 1; } }

/* =========================================================
   Responsive
   ========================================================= */
@media (max-width: 820px) {
  .app { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; inset: 0 auto 0 0;
    width: 280px; z-index: 30;
    transform: translateX(-100%);
    transition: transform var(--transition);
    box-shadow: var(--shadow-lg);
  }
  .sidebar.is-open { transform: translateX(0); }
  .icon-btn--mobile { display: grid; }
  .main__header, .toolbar { padding-left: 16px; padding-right: 16px; }
  .editor { padding: 24px 18px 100px; }
  .meta-bar { padding: 8px 18px; }
}

</style>
<body data-theme="light">
  <div id="app" class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <div class="brand">
          <div class="brand__mark" aria-hidden="true">✦</div>
          <div class="brand__text">
            <div class="brand__title">Lumen</div>
            <div class="brand__subtitle">AI Notes</div>
          </div>
        </div>
        <button class="icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
      </div>

      <button class="btn btn--primary btn--block" id="newNoteBtn">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        New note
      </button>

      <div class="search">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input id="searchInput" type="search" placeholder="Search notes..." autocomplete="off" />
      </div>

      <div class="notes-list" id="notesList" role="list"></div>

      <div class="sidebar__footer">
        <button class="ghost-btn" id="summarizeAllBtn" title="Summarize entire notebook">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h10M4 18h16"/></svg>
          Summarize notebook
        </button>
        <button class="ghost-btn" id="exportBtn" title="Export current note">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
          Export
        </button>
        <button class="ghost-btn" id="importBtn" title="Import notes">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V9"/><path d="m7 14 5-5 5 5"/><path d="M5 3h14"/></svg>
          Import
        </button>
        <input type="file" id="importInput" accept=".json,.md,.txt" hidden />
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <header class="main__header">
        <button class="icon-btn icon-btn--mobile" id="menuBtn" aria-label="Open menu">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <input id="titleInput" class="title-input" type="text" placeholder="Untitled note" />
        <div class="header__actions">
          <span class="save-status" id="saveStatus">Saved</span>
          <button class="btn btn--ghost" id="pinBtn" title="Pin note">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 2h6l-1 7 4 4H6l4-4-1-7Z"/></svg>
          </button>
          <button class="btn btn--ai" id="summarizeBtn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
            Summarize
          </button>
          <button class="icon-btn" id="deleteBtn" title="Delete note" aria-label="Delete note">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6 18 20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </button>
        </div>
      </header>

      <!-- Toolbar -->
      <div class="toolbar" id="toolbar" role="toolbar" aria-label="Formatting">
        <button class="tool" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
        <button class="tool" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
        <button class="tool" data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
        <span class="tool-sep"></span>
        <button class="tool" data-block="h1" title="Heading 1">H1</button>
        <button class="tool" data-block="h2" title="Heading 2">H2</button>
        <button class="tool" data-block="p" title="Paragraph">¶</button>
        <span class="tool-sep"></span>
        <button class="tool" data-cmd="insertUnorderedList" title="Bullet list">• List</button>
        <button class="tool" data-cmd="insertOrderedList" title="Numbered list">1. List</button>
        <button class="tool" data-block="pre" title="Code block">{ }</button>
        <span class="tool-sep"></span>
        <button class="tool" data-cmd="undo" title="Undo">↶</button>
        <button class="tool" data-cmd="redo" title="Redo">↷</button>
        <span class="tool-sep"></span>
        <button class="tool" id="voiceBtn" title="Voice to text">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v4"/></svg>
        </button>
      </div>

      <!-- Editor -->
      <div class="editor-wrap">
        <div
          id="editor"
          class="editor"
          contenteditable="true"
          spellcheck="true"
          data-placeholder="Start writing your thoughts..."
        ></div>
        <div class="meta-bar">
          <span id="wordCount">0 words</span>
          <span id="lastUpdated"></span>
        </div>
      </div>
    </main>
  </div>

  <!-- Summary modal -->
  <div class="modal" id="summaryModal" hidden>
    <div class="modal__backdrop" data-close-modal></div>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="summaryTitle">
      <header class="modal__header">
        <h2 id="summaryTitle">
          <span class="ai-badge">AI</span>
          <span id="summaryHeading">Summary</span>
        </h2>
        <button class="icon-btn" data-close-modal aria-label="Close">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </header>
      <div class="modal__body" id="summaryBody">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton skeleton--sm"></div>
      </div>
      <footer class="modal__footer">
        <button class="btn btn--ghost" id="copySummaryBtn">Copy</button>
        <button class="btn btn--primary" data-close-modal>Done</button>
      </footer>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
